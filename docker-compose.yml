services:
  postgres:
    image: postgres:16
    container_name: aican-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: aican
      POSTGRES_USER: aican
      POSTGRES_PASSWORD: aican-dev-password
    ports:
      - "5432:5432"
    volumes:
      - ./.data/postgres:/var/lib/postgresql/data

  qdrant:
    image: qdrant/qdrant:v1.9.1
    container_name: aican-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - ./.data/qdrant:/qdrant/storage
